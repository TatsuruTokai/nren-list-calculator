<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="N連電卓">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=no">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <title>N連リスト電卓</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f8ff;
      --surface: #ffffff;
      --surface-2: #eef4ff;
      --ink: #142033;
      --muted: #61708a;
      --line: #d7e2f3;
      --accent: #2563eb;
      --accent-dark: #1e40af;
      --accent-soft: #eaf1ff;
      --accent-line: #b8cdf8;
      --accent-ink: #ffffff;
      --green: #0f766e;
      --warn: #dc2626;
      --negative: #dc2626;
      --row-hover: #f8fbff;
      --field-bg: #fbfdff;
      --shadow: 0 18px 50px rgba(37, 99, 235, 0.13);
      --radius: 8px;
      --key-size: clamp(54px, 6.2svh, 64px);
      --lane-min: 300px;
      --sidebar-width: clamp(360px, 40vw, 430px);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      touch-action: manipulation;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      overflow: hidden;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
      font-size: 16px;
      touch-action: manipulation;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      height: 100svh;
      min-height: 100svh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--sidebar-width);
      grid-template-rows: auto minmax(0, 1fr);
    }

    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 76px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(245, 248, 255, 0.92);
      backdrop-filter: blur(18px);
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--accent);
      color: var(--surface);
      font-size: 1.4rem;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 1.12rem;
      line-height: 1.2;
      font-weight: 800;
    }

    .status-line {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .count-pill {
      min-width: 56px;
      min-height: 46px;
      display: inline-grid;
      place-items: center;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: var(--surface);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .icon-btn,
    .text-btn {
      min-height: 46px;
      min-width: 46px;
      display: inline-grid;
      place-items: center;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      font-weight: 800;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    .text-btn {
      min-width: auto;
      padding: 0 16px;
      font-size: 0.94rem;
      font-weight: 750;
    }

    .icon-btn:hover,
    .text-btn:hover {
      transform: translateY(-1px);
      border-color: var(--accent-line);
      background: #fbfdff;
    }

    .icon-btn.primary,
    .text-btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: var(--accent-ink);
    }

    .text-btn.is-active {
      border-color: var(--green);
      background: rgba(15, 118, 110, 0.12);
      color: var(--green);
    }

    .workspace {
      grid-column: 1;
      grid-row: 2;
      min-height: 0;
      overflow: auto;
      padding: 18px 18px 22px 22px;
      scroll-behavior: smooth;
    }

    .lanes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(var(--lane-min), 1fr));
      align-items: start;
      gap: 14px;
      max-width: 1680px;
      margin: 0 auto;
    }

	    .lanes.is-reordering {
	      cursor: grabbing;
	      user-select: none;
	    }

	    .lanes.is-reordering .lane {
	      transition: transform 240ms cubic-bezier(0.2, 0.8, 0.2, 1), border-color 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
	    }

	    .lanes.is-reordering .lane:not(.is-touch-dragging) {
	      animation: lane-wiggle 460ms ease-in-out infinite alternate;
	    }

	    .lanes.is-reordering .lane:nth-child(even):not(.is-touch-dragging) {
	      animation-direction: alternate-reverse;
	    }

	    @keyframes lane-wiggle {
	      from {
	        rotate: -0.16deg;
	      }

	      to {
	        rotate: 0.16deg;
	      }
	    }

	    .lane {
	      min-width: 0;
	      height: min(640px, calc(100svh - 116px));
	      min-height: 460px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
	      background: var(--surface);
	      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
		      overflow: hidden;
	      will-change: transform;
	      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
	    }

	    .lane.is-dragging {
	      opacity: 0.55;
	      transform: scale(0.99);
	    }

	    .lane.is-touch-dragging {
	      opacity: 0;
	      pointer-events: none;
	    }

	    .lane-drag-ghost {
	      position: fixed;
	      left: 0;
	      top: 0;
	      z-index: 1000;
	      pointer-events: none;
	      opacity: 0.98;
	      box-shadow: 0 24px 56px rgba(15, 23, 42, 0.24);
	      transform-origin: center;
	      transition: transform 90ms cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 160ms ease, opacity 160ms ease;
	      will-change: transform;
	    }

	    .lane-drag-ghost .lane-head {
	      cursor: grabbing;
	    }

	    .lane-drag-ghost.is-returning {
	      opacity: 1;
	      transition: transform 190ms cubic-bezier(0.2, 0.8, 0.2, 1), opacity 170ms ease;
	    }

	    @media (prefers-reduced-motion: reduce) {
	      .lanes.is-reordering .lane,
	      .lane-drag-ghost {
	        animation: none;
	        transition: none;
	      }
	    }

	    .lane.is-drop-target {
	      border-color: var(--accent);
	      box-shadow: 0 0 0 3px var(--accent-line), var(--shadow);
	    }

	    .lane.is-active {
	      border-color: rgba(37, 99, 235, 0.72);
	      box-shadow: var(--shadow);
	      transform: translateY(-1px);
	    }

	    .lane.is-locked {
	      border-color: rgba(15, 118, 110, 0.38);
	    }

	    .lane-head {
	      display: grid;
	      grid-template-columns: auto minmax(0, 1fr) auto;
	      align-items: center;
	      gap: 10px;
	      padding: 14px 14px 10px;
	      border-bottom: 1px solid var(--line);
	      background: #fbfdff;
	    }

	    .drag-handle {
	      width: 26px;
	      height: 34px;
	      display: grid;
	      place-items: center;
	      border-radius: 7px;
	      color: var(--muted);
	      font-size: 1rem;
	      font-weight: 850;
	      line-height: 1;
	      cursor: grab;
	      touch-action: none;
	    }

	    .drag-handle:hover {
	      background: var(--surface-2);
	      color: var(--ink);
	    }

	    .lane-title {
	      width: 100%;
	      border: 0;
      outline: 0;
      padding: 4px 0;
      background: transparent;
	      color: var(--ink);
	      font-weight: 800;
	      font-size: 1.08rem;
	      cursor: text;
	    }

    .lane-actions {
      display: flex;
      gap: 4px;
    }

    .lock-badge {
      display: inline-grid;
      place-items: center;
      min-height: 28px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.12);
      color: var(--green);
      font-size: 0.72rem;
      font-weight: 850;
      white-space: nowrap;
    }

    .mini-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font-weight: 850;
      transition: background 140ms ease, color 140ms ease;
    }

    .mini-btn:hover {
      background: var(--surface-2);
      color: var(--ink);
    }

    .lane-total {
      display: grid;
      gap: 4px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfdff;
    }

    .lane-total-label {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 850;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .lane-total-value {
      min-width: 0;
      color: var(--accent);
      font-size: 2rem;
      line-height: 1.05;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tape {
      min-height: 0;
      overflow: auto;
      padding: 8px 0;
    }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 20px;
      color: #8b948c;
      font-weight: 700;
      font-size: 0.92rem;
    }

	    .tape-row {
	      display: grid;
	      grid-template-columns: 56px minmax(0, 1fr) 42px;
	      align-items: center;
	      min-height: 56px;
	      gap: 10px;
	      padding: 10px 12px 10px 14px;
	      border-bottom: 1px solid #edf2fb;
	      transition: background 160ms ease, transform 160ms ease;
	    }

	    .tape-row.number {
	      align-items: start;
	      cursor: pointer;
	    }

	    .tape-row.number.is-editing {
	      background: var(--accent-soft);
	    }

    .tape-row:hover {
      background: #f8fbff;
    }

    .row-op {
      width: 54px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--ink);
      text-align: center;
      font-weight: 850;
      font-size: 1.04rem;
      outline: 0;
    }

    .row-value,
    .row-qty,
    .row-memo,
    .note-value {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

		    .row-value {
		      text-align: right;
		      font-size: 1.18rem;
		      font-weight: 700;
		      cursor: pointer;
	      pointer-events: none;
		    }

    .row-entry {
      min-width: 0;
      display: grid;
      gap: 7px;
    }

	    .row-main {
	      display: grid;
	      grid-template-columns: minmax(96px, 1fr);
	      align-items: center;
	      gap: 8px;
	    }

	    .row-detail {
	      display: grid;
	      grid-template-rows: 0fr;
	      opacity: 0;
	      overflow: hidden;
	      transform: translateY(-4px);
	      transition: grid-template-rows 190ms cubic-bezier(0.22, 1, 0.36, 1), opacity 160ms ease, transform 190ms cubic-bezier(0.22, 1, 0.36, 1);
	      pointer-events: none;
	    }

	    .row-detail.is-open {
	      grid-template-rows: 1fr;
	      opacity: 1;
	      transform: translateY(0);
	      pointer-events: auto;
	    }

	    .row-detail-inner {
	      min-height: 0;
	      display: grid;
	      grid-template-columns: 1fr;
	      gap: 8px;
	      overflow: hidden;
	    }

	    .row-extra-summary {
	      min-width: 0;
	      color: var(--muted);
	      font-size: 0.82rem;
	      font-weight: 650;
	      display: grid;
	      justify-items: end;
	      gap: 2px;
	      line-height: 1.25;
	      text-align: right;
	      overflow: hidden;
	    }

	    .row-extra-summary span {
	      max-width: 100%;
	      overflow: hidden;
	      text-overflow: ellipsis;
	      white-space: nowrap;
	    }

	    .tape-row.has-open-detail .row-extra-summary {
	      display: none;
	    }

	    .qty-box {
	      display: grid;
	      grid-template-columns: auto minmax(0, 1fr);
	      align-items: center;
		      gap: 10px;
		      width: 100%;
	      min-width: 0;
	      height: 42px;
	      padding: 0 10px;
	      border: 1px solid var(--line);
	      border-radius: 7px;
		      background: var(--surface-2);
		      color: var(--muted);
		      font-size: 0.9rem;
	      font-weight: 800;
	      text-align: left;
	      cursor: pointer;
	    }

	    .memo-box {
	      display: grid;
	      gap: 5px;
	      padding: 9px 10px;
	      border: 1px solid var(--line);
	      border-radius: 7px;
	      background: var(--surface-2);
		      color: var(--muted);
		      font-size: 0.84rem;
		      font-weight: 800;
		      cursor: text;
		    }

	    .jan-box {
	      display: grid;
	      grid-template-columns: minmax(0, 1fr) auto;
	      align-items: end;
	      gap: 8px;
	    }

	    .jan-field {
	      min-width: 0;
	      display: grid;
	      gap: 5px;
	      padding: 9px 10px;
	      border: 1px solid var(--line);
	      border-radius: 7px;
	      background: var(--surface-2);
	      color: var(--muted);
	      font-size: 0.84rem;
	      font-weight: 800;
	    }

	    .row-jan {
	      width: 100%;
	      min-width: 0;
	      border: 0;
	      outline: 0;
	      background: transparent;
	      color: var(--ink);
	      font-variant-numeric: tabular-nums;
	    }

	    .jan-lookup {
	      height: 58px;
	      padding: 0 12px;
	      border: 1px solid var(--accent-line);
	      border-radius: 7px;
	      background: var(--accent-soft);
	      color: var(--accent);
	      font-weight: 850;
	      white-space: nowrap;
	    }

		    .row-qty {
		      width: min(120px, 48vw);
		      height: auto;
		      min-height: 0;
		      display: flex;
		      align-items: center;
		      justify-content: flex-end;
		      padding: 0 2px;
		      line-height: 1;
	      text-align: right;
	      color: var(--ink);
	      font-weight: 850;
	      font-variant-numeric: tabular-nums;
	    }

    .row-memo {
      color: #44546d;
      font-size: 1rem;
      font-variant-numeric: normal;
    }

	    .row-subtotal {
	      color: var(--muted);
	      font-size: 0.92rem;
	      font-weight: 500;
	      text-align: right;
	      font-variant-numeric: tabular-nums;
	      overflow: hidden;
	      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .note-value {
      color: #44546d;
      font-size: 0.95rem;
    }

    .tape-row.note {
      grid-template-columns: 48px minmax(0, 1fr) auto;
      background: #f5f9ff;
    }

    .note-badge,
    .memory-badge {
      height: 26px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      font-size: 0.72rem;
      font-weight: 850;
    }

    .note-badge {
      color: var(--green);
      background: rgba(15, 118, 110, 0.11);
    }

    .memory-badge {
      color: var(--accent);
      background: rgba(37, 99, 235, 0.11);
    }

    .memory-value {
      text-align: right;
      color: var(--accent);
      font-weight: 850;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .row-delete {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: transparent;
      color: #9aa39b;
      font-weight: 850;
    }

    .row-delete:hover {
      background: #fee2e2;
      color: var(--warn);
    }

    .lane-foot {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1px;
      border-top: 1px solid var(--line);
      background: var(--line);
    }

    .meter {
      min-width: 0;
      padding: 10px 12px;
      background: #fbfdff;
    }

    .meter-label {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .meter-value {
      display: block;
      margin-top: 3px;
      font-size: 1.05rem;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

	    .meter.memory .meter-value {
	      color: var(--accent);
	    }

	    .is-negative {
	      color: var(--negative) !important;
	    }

    .dock {
      grid-column: 2;
      grid-row: 2;
      min-height: 0;
      overflow: auto;
      border-left: 1px solid var(--line);
      background: rgba(245, 248, 255, 0.95);
      backdrop-filter: blur(18px);
      padding: 18px;
      z-index: 4;
    }

    .dock-inner {
      height: 100%;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      align-items: start;
      gap: 14px;
    }

    .active-readout {
      min-width: 0;
      display: grid;
      gap: 10px;
      padding: 16px;
      border-radius: 8px;
      background: var(--ink);
      color: var(--surface);
    }

    .active-title {
      min-width: 0;
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .side-display {
      min-width: 0;
      text-align: right;
      color: var(--surface);
      font-size: clamp(2.4rem, 5.6svh, 3.4rem);
      line-height: 1.05;
      font-weight: 760;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .active-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: rgba(255, 255, 255, 0.76);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .active-meta span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 9px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      font-variant-numeric: tabular-nums;
    }

    .shortcut-list {
      display: grid;
      gap: 7px;
    }

    .shortcut-btn {
      min-height: 40px;
      width: 100%;
      max-width: 100%;
      padding: 0 11px;
      border: 1px solid var(--accent-line);
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.88rem;
      font-weight: 850;
      overflow: hidden;
      text-align: left;
    }

    .shortcut-btn span,
    .shortcut-btn small {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .shortcut-btn small {
      color: var(--muted);
      font-size: 0.72rem;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      align-content: start;
      gap: 7px;
    }

    .key {
      height: var(--key-size);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
      font-size: 1.18rem;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
      transition: transform 90ms ease, background 90ms ease, border-color 90ms ease;
    }

    .key:hover {
      transform: translateY(-1px);
      background: #fbfdff;
      border-color: var(--accent-line);
    }

    .key:active {
      transform: translateY(1px);
    }

    .key.operator {
      color: var(--accent);
      background: var(--accent-soft);
      border-color: var(--accent-line);
    }

	    .key.commit {
	      background: var(--accent);
	      border-color: var(--accent);
	      color: var(--accent-ink);
	      font-size: 1.18rem;
	    }

	    .key.note-key {
	      grid-column: span 2;
	    }

    .key.utility {
      color: #44546d;
      background: var(--surface-2);
    }

    .key.memory {
      color: var(--green);
      background: #eefaf8;
      border-color: #b9e3dd;
    }

    .key.zero {
      grid-column: span 1;
    }

    dialog {
      width: min(720px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0;
      background: var(--surface);
      color: var(--ink);
      box-shadow: var(--shadow);
    }

    dialog::backdrop {
      background: rgba(20, 32, 51, 0.34);
    }

    .dialog-head,
    .dialog-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .dialog-actions {
      justify-content: flex-end;
      border-top: 1px solid var(--line);
      border-bottom: 0;
    }

    .dialog-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 850;
    }

    .dialog-body {
      display: grid;
      gap: 14px;
      padding: 14px;
    }

    .dialog-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1.1fr) minmax(118px, 0.8fr) minmax(112px, 0.7fr) auto;
      gap: 8px;
      align-items: end;
    }

    .field {
      min-width: 0;
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .field input,
    .field select {
      width: 100%;
      min-width: 0;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 10px;
      outline: 0;
      background: var(--field-bg);
      color: var(--ink);
      font-weight: 750;
    }

    .fee-list {
      display: grid;
      gap: 7px;
    }

    .fee-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      min-height: 48px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field-bg);
    }

    .fee-info {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .fee-name {
      min-width: 0;
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fee-value {
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .fee-picker-dialog {
      width: min(560px, calc(100vw - 28px));
    }

    .fee-breadcrumb {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .fee-crumb {
      min-height: 34px;
      padding: 0 10px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: var(--field-bg);
      color: var(--ink);
      font-size: 0.84rem;
      font-weight: 800;
    }

    .fee-crumb.is-current {
      border-color: var(--accent-line);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .fee-picker-list {
      display: grid;
      gap: 8px;
      max-height: min(54svh, 520px);
      overflow: auto;
    }

    .fee-picker-item {
      width: 100%;
      min-height: 54px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 9px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field-bg);
      color: var(--ink);
      text-align: left;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .fee-picker-item:hover {
      border-color: var(--accent-line);
      background: var(--accent-soft);
      transform: translateY(-1px);
    }

    .fee-picker-info {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .fee-picker-title {
      min-width: 0;
      font-weight: 850;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fee-picker-meta {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .fee-folder-mark {
      color: var(--accent);
      font-weight: 900;
    }

    .dialog-file {
      width: 100%;
      padding: 10px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: var(--field-bg);
      color: var(--muted);
    }

    .export-text {
      width: 100%;
      min-height: 360px;
      display: block;
      resize: vertical;
      border: 0;
      padding: 14px;
      outline: 0;
      color: var(--ink);
      background: #fbfdff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.9rem;
      line-height: 1.55;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 176px;
      transform: translateX(-50%) translateY(14px);
      padding: 10px 13px;
      border-radius: 999px;
      background: var(--ink);
      color: var(--surface);
      font-size: 0.88rem;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 20;
    }

	    .toast.show {
	      opacity: 1;
	      transform: translateX(-50%) translateY(0);
	    }

    .update-banner {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 30;
      width: min(520px, calc(100vw - 28px));
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--accent-line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      box-shadow: var(--shadow);
      transform: translateX(-50%);
    }

    .update-banner.show {
      display: flex;
    }

	    @media (prefers-color-scheme: dark) {
	      :root {
	        color-scheme: dark;
	        --bg: #08111f;
	        --surface: #111827;
	        --surface-2: #182338;
	        --ink: #e7eefc;
	        --muted: #96a4ba;
	        --line: #27364f;
	        --accent: #60a5fa;
	        --accent-dark: #3b82f6;
	        --accent-soft: #132949;
	        --accent-line: #315a9e;
	        --accent-ink: #06111f;
	        --green: #5eead4;
	        --warn: #fb7185;
	        --negative: #fb7185;
	        --row-hover: #162338;
	        --field-bg: #0d1728;
	        --shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
	      }

	      .topbar,
	      .dock {
	        background: rgba(8, 17, 31, 0.92);
	      }

	      .lane-head,
	      .lane-total,
	      .meter,
	      .export-text {
	        background: var(--field-bg);
	      }

	      .icon-btn:hover,
	      .text-btn:hover,
	      .key:hover,
	      .tape-row:hover {
	        background: var(--row-hover);
	      }

		      .active-readout {
		        background: #050b16;
		        color: #f8fafc;
		      }

		      .side-display {
		        color: #ffffff;
		      }

		      .key {
		        color: #f8fafc;
		      }

		      .tape-row {
		        border-bottom-color: var(--line);
		      }

	      .empty,
	      .row-delete {
	        color: var(--muted);
	      }

		      .row-memo,
		      .note-value,
		      .key.utility {
		        color: #e5edff;
		      }

	      .tape-row.note {
	        background: #101c2f;
	      }

	      .key.memory {
	        color: var(--green);
	        background: rgba(20, 184, 166, 0.12);
	        border-color: rgba(94, 234, 212, 0.32);
	      }

	      .row-delete:hover {
	        background: rgba(251, 113, 133, 0.16);
	      }

	      dialog::backdrop {
	        background: rgba(0, 0, 0, 0.56);
	      }
	    }

	    @media (pointer: coarse) and (min-width: 561px) {
      .topbar {
        min-height: 86px;
        padding: 16px 24px;
      }

      .count-pill,
      .icon-btn,
      .text-btn {
        min-height: 52px;
      }

      .dock {
        padding: 20px;
      }

      .keypad {
        gap: 9px;
      }

      .row-value,
      .row-qty,
      .row-memo,
      .note-value,
	      .lane-title {
	        min-height: 44px;
	      }

	      .qty-box .row-qty {
	        min-height: 0;
	      }
	    }

    @media (max-width: 560px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
      }

      .topbar {
        position: sticky;
        top: 0;
        align-items: flex-start;
        flex-direction: column;
      }

      .toolbar {
        width: 100%;
        justify-content: flex-start;
      }

      .workspace {
        grid-column: 1;
        grid-row: 2;
        overflow: visible;
        padding: 14px 12px;
      }

      .lanes {
        grid-template-columns: 1fr;
      }

      .lane {
        height: 560px;
      }

      .dock {
        grid-column: 1;
        grid-row: 3;
        position: sticky;
        bottom: 0;
        border-left: 0;
        border-top: 1px solid var(--line);
        padding: 10px 12px 12px;
      }

      .dock-inner {
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        gap: 10px;
      }

      .active-readout {
        gap: 5px;
      }

      .keypad {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
      }

	      .key {
	        height: 48px;
	      }

	      .toast {
	        bottom: 148px;
	      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 420px) {
      :root {
        --lane-min: 260px;
      }

      .topbar {
        padding: 12px;
      }

      .mark {
        width: 38px;
        height: 38px;
      }

      .toolbar {
        gap: 6px;
      }

      .text-btn {
        padding: 0 10px;
      }

      .lane {
        height: 520px;
      }

      .keypad {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .key {
        min-width: 0;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">Σ</div>
        <div>
          <h1>N連リスト電卓</h1>
          <p class="status-line" id="statusLine">自動保存中</p>
        </div>
      </div>
      <nav class="toolbar" aria-label="全体操作">
        <output class="count-pill" id="laneCount">3連</output>
        <button class="icon-btn primary" type="button" data-control="add-lane" title="電卓を追加" aria-label="電卓を追加">+</button>
        <button class="icon-btn" type="button" data-control="remove-active" title="選択中の電卓を削除" aria-label="選択中の電卓を削除">−</button>
        <button class="text-btn" type="button" data-control="toggle-lock" id="lockToggle" title="選択中の電卓をロック">ロック</button>
        <button class="text-btn" type="button" data-control="fee-picker" title="定型料金を選択">定型料金</button>
        <button class="text-btn" type="button" data-control="export" title="テキストを書き出す">書き出し</button>
        <button class="text-btn" type="button" data-control="backup" title="バックアップと復元">保存/復元</button>
        <button class="text-btn" type="button" data-control="reset-all" title="すべて初期化">初期化</button>
      </nav>
    </header>

    <section class="workspace" aria-label="電卓一覧">
      <div class="lanes" id="lanes"></div>
    </section>

    <section class="dock" aria-label="右サイドバー電卓">
      <div class="dock-inner">
        <div class="active-readout" aria-live="polite">
          <div class="active-title" id="activeTitle">電卓 1</div>
          <output class="side-display" id="sideDisplay">0</output>
          <div class="active-meta">
            <span id="activeInput">入力 + 0</span>
            <span id="activeTotal">合計 0</span>
            <span id="activeMemory">M 0</span>
          </div>
        </div>
        <div class="shortcut-list" id="feeShortcuts" aria-label="定型料金ショートカット"></div>
        <div class="keypad" id="keypad">
          <button class="key utility" type="button" data-key="AC">AC</button>
          <button class="key utility" type="button" data-key="C">C</button>
          <button class="key utility" type="button" data-key="back">⌫</button>
          <button class="key operator" type="button" data-key="÷">÷</button>

          <button class="key" type="button" data-key="7">7</button>
          <button class="key" type="button" data-key="8">8</button>
          <button class="key" type="button" data-key="9">9</button>
          <button class="key operator" type="button" data-key="×">×</button>

          <button class="key" type="button" data-key="4">4</button>
          <button class="key" type="button" data-key="5">5</button>
          <button class="key" type="button" data-key="6">6</button>
          <button class="key operator" type="button" data-key="-">−</button>

          <button class="key" type="button" data-key="1">1</button>
          <button class="key" type="button" data-key="2">2</button>
          <button class="key" type="button" data-key="3">3</button>
          <button class="key operator" type="button" data-key="+">+</button>

	          <button class="key utility" type="button" data-key="00">00</button>
	          <button class="key zero" type="button" data-key="0">0</button>
	          <button class="key" type="button" data-key=".">.</button>
	          <button class="key commit" type="button" data-key="commit">入力</button>

	          <button class="key utility" type="button" data-key="+/-">±</button>
	          <button class="key utility" type="button" data-key="%">%</button>
	          <button class="key utility note-key" type="button" data-key="note">メモ</button>

          <button class="key memory" type="button" data-key="MC">MC</button>
          <button class="key memory" type="button" data-key="MR">MR</button>
          <button class="key memory" type="button" data-key="M+">M+</button>
          <button class="key memory" type="button" data-key="M-">M−</button>
        </div>
      </div>
    </section>
  </main>

  <dialog id="exportDialog">
    <div class="dialog-head">
      <h2 class="dialog-title">書き出し</h2>
      <button class="icon-btn" type="button" data-dialog="close" title="閉じる" aria-label="閉じる">×</button>
    </div>
    <textarea class="export-text" id="exportText" spellcheck="false"></textarea>
    <div class="dialog-actions">
      <button class="text-btn" type="button" data-dialog="download">TXT保存</button>
      <button class="text-btn primary" type="button" data-dialog="copy">コピー</button>
    </div>
  </dialog>

  <dialog id="feeDialog">
    <div class="dialog-head">
      <h2 class="dialog-title">定型料金</h2>
      <button class="icon-btn" type="button" data-fee-dialog="close" title="閉じる" aria-label="閉じる">×</button>
    </div>
    <div class="dialog-body">
      <p class="dialog-note">よく使う料金を登録すると、定型料金ポップアップから現在の電卓へ追加できます。フォルダは「保証/プレ保プラス」のように入力できます。%指定は現在の商品代金合計を基準に計算します。</p>
      <div class="form-grid">
        <label class="field">名前
          <input id="feeName" placeholder="例: 長期保証">
        </label>
        <label class="field">フォルダ
          <input id="feeFolder" placeholder="例: 保証/プレ保プラス">
        </label>
        <label class="field">種類
          <select id="feeType">
            <option value="fixed">固定額</option>
            <option value="percent">商品代金の%</option>
          </select>
        </label>
        <label class="field">金額 / %
          <input id="feeValue" inputmode="decimal" placeholder="例: 5">
        </label>
        <button class="text-btn primary" type="button" data-fee-dialog="add">追加</button>
      </div>
      <div class="fee-list" id="feeList"></div>
    </div>
  </dialog>

  <dialog class="fee-picker-dialog" id="feePickerDialog">
    <div class="dialog-head">
      <h2 class="dialog-title">定型料金</h2>
      <button class="icon-btn" type="button" data-fee-picker="close" title="閉じる" aria-label="閉じる">×</button>
    </div>
    <div class="dialog-body">
      <div class="fee-breadcrumb" id="feeBreadcrumb"></div>
      <div class="fee-picker-list" id="feePickerList"></div>
    </div>
    <div class="dialog-actions">
      <button class="text-btn" type="button" data-fee-picker="settings">編集</button>
    </div>
  </dialog>

  <dialog id="backupDialog">
    <div class="dialog-head">
      <h2 class="dialog-title">保存/復元</h2>
      <button class="icon-btn" type="button" data-backup-dialog="close" title="閉じる" aria-label="閉じる">×</button>
    </div>
    <div class="dialog-body">
      <p class="dialog-note">電卓、定型料金、JAN手入力辞書をJSONとして保存・復元します。</p>
      <input class="dialog-file" id="backupFile" type="file" accept="application/json,.json">
    </div>
    <textarea class="export-text" id="backupText" spellcheck="false"></textarea>
    <div class="dialog-actions">
      <button class="text-btn" type="button" data-backup-dialog="restore">復元</button>
      <button class="text-btn" type="button" data-backup-dialog="download">JSON保存</button>
      <button class="text-btn primary" type="button" data-backup-dialog="copy">コピー</button>
    </div>
  </dialog>

  <div class="update-banner" id="updateBanner">
    <span>新しいバージョンがあります</span>
    <button class="text-btn primary" type="button" id="updateReload">更新</button>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORAGE_KEY = "nren-list-calculator-state-v1";
    const SETTINGS_KEY = "nren-list-calculator-settings-v1";
    const BACKUP_VERSION = 3;
    const operators = ["+", "-", "×", "÷"];
    const lanesEl = document.getElementById("lanes");
    const keypadEl = document.getElementById("keypad");
    const feeShortcutsEl = document.getElementById("feeShortcuts");
    const laneCountEl = document.getElementById("laneCount");
    const statusLineEl = document.getElementById("statusLine");
    const lockToggleEl = document.getElementById("lockToggle");
    const activeTitleEl = document.getElementById("activeTitle");
    const activeInputEl = document.getElementById("activeInput");
    const activeTotalEl = document.getElementById("activeTotal");
    const activeMemoryEl = document.getElementById("activeMemory");
    const exportDialog = document.getElementById("exportDialog");
    const exportTextEl = document.getElementById("exportText");
    const feeDialog = document.getElementById("feeDialog");
    const feeListEl = document.getElementById("feeList");
    const feeNameEl = document.getElementById("feeName");
    const feeFolderEl = document.getElementById("feeFolder");
    const feeTypeEl = document.getElementById("feeType");
    const feeValueEl = document.getElementById("feeValue");
    const feePickerDialog = document.getElementById("feePickerDialog");
    const feePickerListEl = document.getElementById("feePickerList");
    const feeBreadcrumbEl = document.getElementById("feeBreadcrumb");
    const backupDialog = document.getElementById("backupDialog");
    const backupTextEl = document.getElementById("backupText");
    const backupFileEl = document.getElementById("backupFile");
    const updateBannerEl = document.getElementById("updateBanner");
    const updateReloadEl = document.getElementById("updateReload");
    const toastEl = document.getElementById("toast");
    const sideDisplayEl = document.getElementById("sideDisplay");

	    let toastTimer = null;
	    let longPressTimer = null;
	    let laneDragTimer = null;
	    let laneDragState = null;
	    let draggedLaneId = null;
	    let pendingServiceWorker = null;
	    let feePickerPath = [];
    let settings = restoreSettings();
    let state = restoreState() || createDefaultState();
    ensureActiveLane();
    recomputeAllMemory();
    render();

    document.querySelector(".toolbar").addEventListener("click", (event) => {
      const button = event.target.closest("[data-control]");
      if (!button) return;
      handleControl(button.dataset.control);
    });

    feeShortcutsEl.addEventListener("click", (event) => {
      const feeButton = event.target.closest("[data-fee-id]");
      if (feeButton) {
        applyFeeShortcut(feeButton.dataset.feeId);
        return;
      }

      const control = event.target.closest("[data-control]");
      if (control) handleControl(control.dataset.control);
    });

				    lanesEl.addEventListener("click", (event) => {
				      const laneEl = event.target.closest(".lane");
				      if (laneEl) setActiveLane(laneEl.dataset.laneId);

				      const titleInput = event.target.closest(".lane-title");
				      if (titleInput) {
				        requestAnimationFrame(() => titleInput.select?.());
				      }

					      const detailBox = event.target.closest(".qty-box, .memo-box");
					      if (detailBox && !event.target.matches("input")) {
					        focusDetailBox(detailBox);
					      }

					      const rowEl = event.target.closest(".tape-row.number");
					      if (rowEl && !isRowControlTarget(event.target)) {
				        selectNumberRow(rowEl.closest(".lane")?.dataset.laneId, rowEl.dataset.rowId);
				      }

		      const button = event.target.closest("[data-action]");
		      if (!button) return;
		      event.stopPropagation();
	      handleLaneAction(button.dataset.action, button);
	    });

	    lanesEl.addEventListener("input", (event) => {
	      const target = event.target;
	      const lane = getLane(target.closest(".lane")?.dataset.laneId);
      if (!lane) return;
      if (isLaneLocked(lane)) return;

      if (target.matches(".lane-title")) {
        lane.title = target.value.trim() || "無題";
        refreshSummary();
        saveState();
        return;
      }

      const row = getRow(lane, target.dataset.rowId);
      if (!row) return;

	      if (target.matches(".row-value")) {
	        row.value = target.value;
	        lane.editingRowId = row.id;
	        lane.current = target.value || "0";
	        lane.pendingOp = row.op;
	        lane.isTyping = true;
	        lane.justEvaluated = false;
	        refreshRowSubtotal(lane, row);
	        refreshLaneMeters(lane);
	        saveState();
      }

      if (target.matches(".row-qty")) {
        row.qty = normalizeQuantityInput(target.value);
        target.value = row.qty;
        refreshRowSubtotal(lane, row);
        refreshLaneMeters(lane);

      const lanes = [createLane("電卓 1"), createLane("電卓 2"), createLane("電卓 3")];
      return {
        activeId: lanes[0].id,
        lanes
      };

    function createLane(title) {
      return {
        id: uid(),
        title,
        rows: [],
	        current: "0",
	        pendingOp: "+",
	        isTyping: false,
	        justEvaluated: false,
	        editingRowId: "",
	        editingField: "value",
	        memory: 0,
	        locked: false
	      };
    }

    function createDefaultSettings() {
      return {
        fees: [],
        janProducts: {}
      };
    }

    function uid() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return `id-${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`;
    }

    function restoreState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        return sanitizeState(JSON.parse(raw));
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    function restoreSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (!raw) return createDefaultSettings();
        return sanitizeSettings(JSON.parse(raw));
      } catch (error) {
        console.warn(error);
        return createDefaultSettings();
      }
    }

    function sanitizeState(candidate) {
      if (!candidate || !Array.isArray(candidate.lanes) || candidate.lanes.length === 0) return null;
      const lanes = candidate.lanes.map(sanitizeLane).filter(Boolean);
      if (!lanes.length) return null;
      return {
        activeId: lanes.some((lane) => lane.id === candidate.activeId) ? candidate.activeId : lanes[0].id,
        lanes
      };
    }

    function sanitizeSettings(candidate) {
      const defaults = createDefaultSettings();
      if (!candidate || typeof candidate !== "object") return defaults;
      const fees = Array.isArray(candidate.fees) ? candidate.fees.map(sanitizeFee).filter(Boolean) : [];
      const janProducts = {};
      if (candidate.janProducts && typeof candidate.janProducts === "object") {
        Object.entries(candidate.janProducts).forEach(([jan, value]) => {
          const cleanJan = normalizeJanInput(jan);
          const title = typeof value === "string" ? value : value?.title;
          if (cleanJan && title) {
            janProducts[cleanJan] = {
              title: String(title).trim(),
              source: typeof value?.source === "string" ? value.source : "manual"
            };
          }
        });
      }
      return { fees, janProducts };
    }

    function sanitizeFee(fee) {
      if (!fee || typeof fee !== "object") return null;
      const value = Number(String(fee.value ?? "").replace(/,/g, ""));
      if (!Number.isFinite(value)) return null;
      const name = String(fee.name || "").trim();
      if (!name) return null;
      return {
        id: fee.id || uid(),
        name,
        type: fee.type === "percent" ? "percent" : "fixed",
        value,
        path: sanitizeFeePath(fee.path || fee.folder || fee.folderPath || "")
      };
    }

    function sanitizeFeePath(value) {
      const source = Array.isArray(value) ? value : String(value || "").split(/[/>＞→]+/);
      return source
        .map((segment) => String(segment || "").trim())
        .filter(Boolean);
    }

    function sanitizeLane(lane, index) {
      const cleanRows = Array.isArray(lane.rows) ? lane.rows.map(sanitizeRow).filter(Boolean) : [];
      return {
        id: lane.id || uid(),
        title: lane.title || `電卓 ${index + 1}`,
        rows: cleanRows,
	        current: typeof lane.current === "string" ? lane.current : "0",
	        pendingOp: operators.includes(lane.pendingOp) ? lane.pendingOp : "+",
	        isTyping: Boolean(lane.isTyping),
	        justEvaluated: Boolean(lane.justEvaluated),
	        editingRowId: typeof lane.editingRowId === "string" ? lane.editingRowId : "",
	        editingField: lane.editingField === "qty" ? "qty" : "value",
	        memory: Number.isFinite(Number(lane.memory)) ? Number(lane.memory) : 0,
	        locked: Boolean(lane.locked)
	      };
    }

    function sanitizeRow(row) {
      if (!row || typeof row !== "object") return null;
      if (row.type === "note") {
        return { id: row.id || uid(), type: "note", note: row.note || "" };
      }
      if (row.type === "memory") {
        return {
          id: row.id || uid(),
          type: "memory",
          mode: row.mode === "M-" || row.mode === "MC" ? row.mode : "M+",
          value: typeof row.value === "string" ? row.value : "0"
        };
      }
	      return {
	        id: row.id || uid(),
	        type: "number",
	        op: operators.includes(row.op) ? row.op : "+",
	        value: typeof row.value === "string" ? row.value : "0",
	        qty: typeof row.qty === "string" ? row.qty : "1",
	        memo: typeof row.memo === "string" ? row.memo : "",
	        jan: typeof row.jan === "string" ? normalizeJanInput(row.jan) : "",
	        isFee: Boolean(row.isFee),
	        detailOpen: Boolean(row.detailOpen)
	      };
	    }

	    function renderLane(lane) {
	      const activeClass = lane.id === state.activeId ? " is-active" : "";
	      const lockedClass = lane.locked ? " is-locked" : "";
	      const disabledAttr = lane.locked ? " disabled" : "";
	      const readonlyAttr = lane.locked ? " readonly" : "";
	      const segment = calculateSegment(lane, true);
	      const totalClass = segment.ok && segment.value < 0 ? " is-negative" : "";
	      const memoryClass = lane.memory < 0 ? " is-negative" : "";
	      return `
	        <article class="lane${activeClass}${lockedClass}" data-lane-id="${escapeHtml(lane.id)}">
	          <header class="lane-head">
	            <span class="drag-handle" aria-hidden="true" title="並べ替え">≡</span>

	              ${lane.locked ? `<span class="lock-badge">LOCK</span>` : ""}
	              <button class="mini-btn" type="button" data-action="duplicate-lane" title="複製" aria-label="複製">⧉</button>
	              <button class="mini-btn" type="button" data-action="clear-lane" title="この電卓を空にする" aria-label="この電卓を空にする"${disabledAttr}>⌧</button>
              <button class="mini-btn" type="button" data-action="delete-lane" title="削除" aria-label="削除"${disabledAttr}>×</button>
            </div>
	          </header>
	          <div class="lane-total">
	            <span class="lane-total-label">Total</span>
	            <output class="lane-total-value${totalClass}" data-meter="hero-total">${escapeHtml(formatResult(segment))}</output>
	          </div>
	          <div class="tape">
	            ${lane.rows.length ? lane.rows.map((row) => renderRow(row, lane)).join("") : `<div class="empty">No entries</div>`}
          </div>
          <footer class="lane-foot">
	            <div class="meter memory">
	              <span class="meter-label">Memory</span>
	              <span class="meter-value${memoryClass}" data-meter="memory">${escapeHtml(formatDisplay(lane.memory))}</span>
	            </div>
          </footer>
        </article>
      `;
    }

	    function renderRow(row, lane = null) {
      const disabledAttr = lane?.locked ? " disabled" : "";
      if (row.type === "note") {
        return `
          <div class="tape-row note" data-row-id="${escapeHtml(row.id)}">
            <span class="note-badge">メモ</span>
            <input class="note-value" data-row-id="${escapeHtml(row.id)}" value="${escapeAttr(row.note)}" placeholder="短いメモ"${disabledAttr}>
            <button class="row-delete" type="button" data-action="delete-row" data-row-id="${escapeHtml(row.id)}" title="行を削除" aria-label="行を削除"${disabledAttr}>×</button>
          </div>
        `;
      }

	      if (row.type === "memory") {
	        const label = row.mode === "MC" ? "MC" : row.mode;
	        const memoryAmount = row.mode === "MC" ? 0 : signedMemoryValue(row);
	        const memoryClass = memoryAmount < 0 ? " is-negative" : "";
	        return `
	          <div class="tape-row memory-row" data-row-id="${escapeHtml(row.id)}">
	            <span class="memory-badge">${escapeHtml(label)}</span>
	            <span class="memory-value${memoryClass}">${escapeHtml(formatDisplay(memoryAmount))}</span>
	            <button class="row-delete" type="button" data-action="delete-row" data-row-id="${escapeHtml(row.id)}" title="行を削除" aria-label="行を削除"${disabledAttr}>×</button>
	          </div>
	        `;
	      }

	      const rowNegative = isNegativeRow(row);
		      const subtotalNegative = isNegativeContribution(row) || isNegativeNumber(effectiveRowValue(row));
		      const detailClass = row.detailOpen ? " is-open" : "";
		      const detailOpenClass = row.detailOpen ? " has-open-detail" : "";
		      const summary = rowDetailSummary(row);
		      const editingClass = lane?.editingRowId === row.id ? " is-editing" : "";
		      return `
		        <div class="tape-row number${editingClass}${detailOpenClass}" data-row-id="${escapeHtml(row.id)}">
	          <select class="row-op" data-row-id="${escapeHtml(row.id)}" aria-label="演算子"${disabledAttr}>

    function handleControl(control) {
      if (control === "add-lane") {
        const lane = createLane(`電卓 ${state.lanes.length + 1}`);
        state.lanes.push(lane);
        state.activeId = lane.id;
        render();
        scrollLaneIntoView(lane.id);
        return;
      }

      if (control === "remove-active") {
        const lane = activeLane();
        if (!guardLaneUnlocked(lane)) return;
        removeLane(state.activeId);
        return;
      }

      if (control === "toggle-lock") {
        toggleActiveLaneLock();
        return;
      }

      if (control === "fee-picker") {
        openFeePickerDialog();
        return;
      }

      if (control === "fee-settings") {
        openFeeDialog();
        return;
      }

      if (control === "backup") {
        openBackupDialog();
        return;
      }

      if (control === "export") {
        exportTextEl.value = buildExportText();
        exportDialog.showModal();
        exportTextEl.focus();
        exportTextEl.select();
        return;
      }

      if (control === "reset-all") {
        if (!confirm("すべての電卓を初期状態に戻しますか。")) return;
        state = createDefaultState();
        render();
        showToast("初期化しました");
      }
    }

    async function handleLaneAction(action, button) {
      const laneEl = button.closest(".lane");
      const lane = getLane(laneEl?.dataset.laneId);
      if (!lane) return;

      if (action === "duplicate-lane") {
	        const copy = JSON.parse(JSON.stringify(lane));
	        copy.id = uid();
	        copy.title = `${lane.title} copy`;
	        copy.rows = copy.rows.map((row) => ({ ...row, id: uid() }));
	        copy.editingRowId = "";
	        copy.editingField = "value";
	        copy.locked = false;
	        state.lanes.splice(state.lanes.indexOf(lane) + 1, 0, copy);
        state.activeId = copy.id;
        render();
        scrollLaneIntoView(copy.id);
        return;
      }

      if (!guardLaneUnlocked(lane)) return;

      if (action === "clear-lane") {
        lane.rows = [];
        lane.current = "0";
	        lane.pendingOp = "+";
	        lane.isTyping = false;
	        lane.justEvaluated = false;
	        lane.editingRowId = "";
	        lane.editingField = "value";
	        lane.memory = 0;
        render();
        return;
      }

      if (action === "delete-lane") {
        removeLane(lane.id);
        return;
      }

      if (action === "lookup-jan") {
        await lookupJanForButton(button);
        return;
      }

	      if (action === "delete-row") {
	        if (lane.editingRowId === button.dataset.rowId) {
	          lane.editingRowId = "";
	          lane.editingField = "value";
	          lane.current = "0";
	          lane.isTyping = false;
	        }
	        lane.rows = lane.rows.filter((row) => row.id !== button.dataset.rowId);
        recomputeMemory(lane);
        render();
      }
    }

      feeShortcutsEl.innerHTML = `
        <button class="shortcut-btn" type="button" data-control="fee-picker">
          <span>${count ? `定型料金 ${count}件` : "定型料金を追加"}</span>
          <small>${count ? "ポップアップで選択" : "未登録"}</small>
        </button>
      `;
    }

    function openFeeDialog(defaultPath = []) {
      const cleanPath = sanitizeFeePath(defaultPath);
      if (cleanPath.length && !feeFolderEl.value.trim()) {
        feeFolderEl.value = cleanPath.join("/");
      }
      renderFeeList();
      feeDialog.showModal();
      requestAnimationFrame(() => feeNameEl.focus());
    }

    function renderFeeList() {
      feeListEl.innerHTML = settings.fees.length ? settings.fees.map((fee) => `
        <div class="fee-item">
          <div class="fee-info">
            <span class="fee-name">${escapeHtml(fee.name)}</span>
            <span class="fee-value">${escapeHtml(formatFeePath(fee))} / ${escapeHtml(formatFeeLabel(fee))}</span>
          </div>
          <button class="mini-btn" type="button" data-fee-dialog="delete" data-fee-id="${escapeAttr(fee.id)}" title="削除" aria-label="削除">×</button>
        </div>
      `).join("") : `<p class="dialog-note">まだ定型料金がありません。</p>`;
    }

    function addFeeFromForm() {
      const fee = sanitizeFee({
        id: uid(),
        name: feeNameEl.value,
        path: feeFolderEl.value,
        type: feeTypeEl.value,
        value: feeValueEl.value
      });
      if (!fee) {
        showToast("定型料金を確認してください");
        return;
      }
      settings.fees.push(fee);
      saveSettings();
      feeNameEl.value = "";
      feeFolderEl.value = "";
      feeValueEl.value = "";
      renderFeeList();
      renderFeeShortcuts();
      renderFeePicker();
      showToast("定型料金を追加しました");
    }

    function deleteFee(id) {
      settings.fees = settings.fees.filter((fee) => fee.id !== id);
      saveSettings();
      renderFeeList();
      renderFeeShortcuts();
      renderFeePicker();
    }

    function formatFeeLabel(fee) {
      if (fee.type === "percent") return `商品代金の${formatDisplay(fee.value)}%`;
      return `${formatDisplay(fee.value)}円`;
    }

    function formatFeePath(fee) {
      const path = sanitizeFeePath(fee.path);
      return path.length ? path.join(" / ") : "トップ";
    }

    function openFeePickerDialog(path = []) {
      feePickerPath = sanitizeFeePath(path);
      renderFeePicker();
      if (!feePickerDialog.open) {
        feePickerDialog.showModal();
      }
    }

    function renderFeePicker() {
      if (!feePickerDialog || !feePickerListEl || !feeBreadcrumbEl) return;
      renderFeeBreadcrumb();
      const folders = new Set();
      const fees = [];

      for (const fee of settings.fees) {
        const path = sanitizeFeePath(fee.path);
        if (!isSameFeePath(path.slice(0, feePickerPath.length), feePickerPath)) continue;
        if (path.length > feePickerPath.length) {
          folders.add(path[feePickerPath.length]);
        } else {
          fees.push(fee);
        }
      }

      const folderItems = [...folders]
        .sort(compareJa)
        .map((folder) => `
          <button class="fee-picker-item" type="button" data-fee-folder="${escapeAttr(folder)}">
            <span class="fee-picker-title">${escapeHtml(folder)}</span>
            <span class="fee-folder-mark">&gt;</span>
          </button>
        `).join("");

      const feeItems = fees
        .slice()
        .sort((a, b) => compareJa(a.name, b.name))
        .map((fee) => `
          <button class="fee-picker-item" type="button" data-fee-id="${escapeAttr(fee.id)}" title="${escapeAttr(formatFeeLabel(fee))}">
            <span class="fee-picker-info">
              <span class="fee-picker-title">${escapeHtml(fee.name)}</span>
            </span>
            <span class="fee-picker-meta">${escapeHtml(formatFeeLabel(fee))}</span>
          </button>
        `).join("");

      const hasItems = Boolean(folderItems || feeItems);
      feePickerListEl.innerHTML = hasItems
        ? `${folderItems}${feeItems}`
        : `<p class="dialog-note">${settings.fees.length ? "このフォルダには定型料金がありません。" : "まだ定型料金がありません。編集から追加してください。"}</p>`;
    }

    function renderFeeBreadcrumb() {
      const crumbs = [
        `<button class="fee-crumb${feePickerPath.length ? "" : " is-current"}" type="button" data-fee-picker="crumb" data-fee-depth="-1">定型料金</button>`
      ];
      feePickerPath.forEach((segment, index) => {
        crumbs.push(`<span class="fee-folder-mark">/</span>`);
        crumbs.push(`
          <button class="fee-crumb${index === feePickerPath.length - 1 ? " is-current" : ""}" type="button" data-fee-picker="crumb" data-fee-depth="${index}">
            ${escapeHtml(segment)}
          </button>
        `);
      });
      feeBreadcrumbEl.innerHTML = crumbs.join("");
    }

    function isSameFeePath(first, second) {
      if (first.length !== second.length) return false;
      return first.every((segment, index) => segment === second[index]);
    }

    function compareJa(first, second) {
      return String(first).localeCompare(String(second), "ja-JP", { numeric: true, sensitivity: "base" });
    }

    function applyFeeShortcut(id) {
      const lane = activeLane();
      if (!lane || !guardLaneUnlocked(lane)) return false;
      const fee = settings.fees.find((item) => item.id === id);
      if (!fee) return false;
      if (lane.isTyping) {
        commitCurrent(lane, true);
      }
      const base = fee.type === "percent" ? calculateFeeBase(lane) : calculateSegment(lane, false);
      if (!base.ok) {
        showToast(base.label);
        return false;
      }
      const amount = fee.type === "percent" ? base.value * fee.value / 100 : fee.value;
      if (!Number.isFinite(amount)) {
        showToast("定型料金を確認してください");
        return false;
      }
      lane.rows.push({
        id: uid(),
        type: "number",
        op: "+",
        value: formatPlain(amount),
        qty: "1",
        memo: fee.type === "percent" ? `${fee.name} ${formatDisplay(fee.value)}%` : fee.name,
        jan: "",
        isFee: true,
        detailOpen: false
      });
      lane.current = "0";
      lane.pendingOp = "+";
      lane.isTyping = false;
      lane.justEvaluated = false;
      lane.editingRowId = "";
      lane.editingField = "value";
      render();
      return true;
    }

    function openBackupDialog() {
      backupTextEl.value = buildBackupText();
      backupFileEl.value = "";
      backupDialog.showModal();
      backupTextEl.focus();
      backupTextEl.select();
    }

    function buildBackupText() {
      return JSON.stringify({
        app: "nren-list-calculator",
        version: BACKUP_VERSION,
        exportedAt: new Date().toISOString(),
        state,
        settings
      }, null, 2);
    }

    function restoreBackupText() {
      let parsed;
      try {
        parsed = JSON.parse(backupTextEl.value);
      } catch (error) {
        showToast("JSONを確認してください");
        return;
      }

      const nextState = sanitizeState(parsed.state || parsed);
      const nextSettings = sanitizeSettings(parsed.settings || settings);
      if (!nextState) {
        showToast("バックアップ形式を確認してください");
        return;
      }
      if (!confirm("現在の内容をバックアップの内容で上書きしますか。")) return;
      state = nextState;
      settings = nextSettings;
      saveSettings();
      render();
      backupDialog.close();
      showToast("復元しました");
    }

    async function lookupJanForButton(button) {
      const lane = getLane(button.closest(".lane")?.dataset.laneId);
      const row = lane ? getRow(lane, button.dataset.rowId) : null;
      if (!lane || !row || !guardLaneUnlocked(lane)) return;
      const rowEl = button.closest(".tape-row.number");
      const janInput = rowEl?.querySelector(".row-jan");
      const jan = normalizeJanInput(janInput?.value || row.jan);
      if (!isValidJan(jan)) {
        showToast("JANコードを確認してください");
        return;
      }
      row.jan = jan;
      button.disabled = true;
      button.textContent = "検索中";
      try {
        const product = await lookupJanProduct(jan);
        if (!product?.title) {
          showToast("商品名が見つかりません");
          return;
        }
        row.memo = product.title;
        rememberManualJanProduct(row, product.source || "lookup");
        render();
        showToast("商品名を入力しました");
      } catch (error) {
        console.warn(error);
        showToast("JAN検索に失敗しました");
      } finally {
        button.disabled = false;
        button.textContent = "検索";
      }
    }

    async function lookupJanProduct(jan) {
      const cached = settings.janProducts[jan];
      if (cached?.title) return cached;
      const sources = [
        `https://world.openproductsfacts.org/api/v2/product/${encodeURIComponent(jan)}.json`,
        `https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(jan)}.json`
      ];
      for (const url of sources) {
        try {
          const response = await fetch(url, { headers: { "Accept": "application/json" } });
          if (!response.ok) continue;
          const data = await response.json();
          const product = data.product || {};
          const title = product.product_name_ja || product.product_name || product.generic_name_ja || product.generic_name || product.brands;
          if (title) {
            return { title: String(title).trim(), source: "openfacts" };
          }
        } catch (error) {
          console.warn(error);
        }
      }
      return null;
    }

    function rememberManualJanProduct(row, source = "manual") {
      const jan = normalizeJanInput(row.jan);
      const title = String(row.memo || "").trim();
      if (!isValidJan(jan) || !title) return;
      settings.janProducts[jan] = { title, source };
      saveSettings();
    }

    function handleKey(key) {
      const lane = activeLane();
      if (!lane) return;
      if (!guardLaneUnlocked(lane)) return;

      const previousRowsLength = lane.rows.length;
      const previousEditingRowId = lane.editingRowId;
      let partial = false;
      if (/^\d$/.test(key) || key === "00") {
        inputDigit(lane, key);
        partial = true;
	      } else if (key === ".") {
	        inputDecimal(lane);
	        partial = true;
	      } else if (operators.includes(key)) {
	        inputOperator(lane, key);
	      } else if (key === "commit") {
	        commitCurrent(lane, true);
      } else if (key === "C") {
        clearCurrent(lane);
        partial = true;
      } else if (key === "AC") {
        clearActiveSegment(lane);
      } else if (key === "back") {
        backspace(lane);
        partial = true;
	      } else if (key === "+/-") {
	        toggleSign(lane);
	        partial = true;
	      } else if (key === "%") {
	        percent(lane);
	        partial = true;
	      } else if (key === "note") {
	        addNote(lane);
      } else if (key === "M+") {
        memoryAdd(lane, 1);
      } else if (key === "M-") {
        memoryAdd(lane, -1);
      } else if (key === "MR") {
        memoryRecall(lane);
      } else if (key === "MC") {
        memoryClear(lane);
      }

      if (partial && previousRowsLength === lane.rows.length && previousEditingRowId === lane.editingRowId) {
        refreshActiveEdit(lane);
      } else {
        render();
      }
    }

	    function inputDigit(lane, digit) {
	      if (lane.justEvaluated) {
	        clearActiveSegment(lane, { keepMemoryRows: true });
	      }
	      lane.justEvaluated = false;

	      if (!lane.isTyping || lane.current === "0") {
	        lane.current = digit === "00" ? "0" : digit;
	      } else {
	        lane.current += digit;
	      }

	      lane.current = trimInputLength(lane.current);
	      lane.isTyping = true;
	      ensureEditableNumberRow(lane);
	      syncEditingRowValue(lane);
	    }

	    function inputDecimal(lane) {
	      if (lane.justEvaluated) {
        clearActiveSegment(lane, { keepMemoryRows: true });
      }
      lane.justEvaluated = false;

      if (!lane.isTyping) {
        lane.current = "0.";
	      } else if (!lane.current.includes(".")) {
	        lane.current += ".";
	      }
	      lane.isTyping = true;
	      ensureEditableNumberRow(lane);
	      syncEditingRowValue(lane);
	    }

	    function inputOperator(lane, op) {
	      if (lane.editingField === "qty" && activeNumberRow(lane)) {
	        commitCurrent(lane, true);
	        lane.pendingOp = op;
	        return;
	      }

	      if (lane.justEvaluated) {
	        const result = parseNumber(lane.current);
	        replaceActiveSegment(lane, Number.isFinite(result) ? [{ id: uid(), type: "number", op: "+", value: formatPlain(result) }] : []);
	        lane.current = "0";
	        lane.isTyping = false;
	        lane.justEvaluated = false;
	        lane.editingRowId = "";
	        lane.editingField = "value";
	        lane.pendingOp = op;
	        return;
	      }

      if (lane.isTyping) {
        commitCurrent(lane, true);
      }
      lane.pendingOp = op;
    }

			    function commitCurrent(lane, force = false) {
		      const row = activeNumberRow(lane);
		      if (!lane.isTyping && !force && !row) return false;
		      const value = parseNumber(lane.current);
		      if (!Number.isFinite(value)) {
	        showToast("数値を確認してください");
	        return false;
		      }

	      if (row && lane.editingField === "qty") {
	        row.qty = normalizeQuantityInput(lane.current) || "1";
	        closeRowDetail(lane, row);
	        lane.current = "0";
	        lane.pendingOp = "+";
	        lane.isTyping = false;
	        lane.justEvaluated = false;
	        lane.editingRowId = "";
	        lane.editingField = "value";
	        return true;
	      }

		      if (row) {
		        row.value = normalizeInput(lane.current);
		        row.detailOpen = false;
	      } else {
	        lane.rows.push({
	          id: uid(),
	          type: "number",
		        op: lane.pendingOp,
		        value: normalizeInput(lane.current),
		        qty: "1",
		        memo: "",
		        detailOpen: false
		      });
	      }
	      lane.current = "0";
	      lane.pendingOp = "+";
		      lane.isTyping = false;
		      lane.justEvaluated = false;
		      lane.editingRowId = "";
	      lane.editingField = "value";
		      return true;
		    }

	    function clearCurrent(lane) {
	      lane.current = lane.editingField === "qty" ? "1" : "0";
	      lane.isTyping = false;
	      lane.justEvaluated = false;
	      syncEditingRowValue(lane);
	    }

    function clearActiveSegment(lane, options = {}) {
      const start = options.keepMemoryRows ? activeSegmentStart(lane) : 0;
      lane.rows.splice(start);
      lane.current = "0";
	      lane.pendingOp = "+";
	      lane.isTyping = false;
	      lane.justEvaluated = false;
	      lane.editingRowId = "";
	      lane.editingField = "value";
	      recomputeMemory(lane);
	    }

	    function replaceActiveSegment(lane, rows) {
	      const start = activeSegmentStart(lane);
	      lane.rows.splice(start, lane.rows.length - start, ...rows);
	      lane.editingRowId = "";
	      lane.editingField = "value";
	      recomputeMemory(lane);
	    }

	    function activeNumberRow(lane) {
	      const row = lane.editingRowId ? getRow(lane, lane.editingRowId) : null;
	      return row && row.type === "number" ? row : null;
	    }

		    function ensureEditableNumberRow(lane) {
		      const row = activeNumberRow(lane);
		      if (row) return row;
	      lane.editingField = "value";
		      const nextRow = {
	        id: uid(),
	        type: "number",
	        op: lane.pendingOp,
	        value: lane.current || "0",
	        qty: "1",
	        memo: "",
	        detailOpen: false
	      };
	      lane.rows.push(nextRow);
	      lane.editingRowId = nextRow.id;
	      return nextRow;
	    }

		    function syncEditingRowValue(lane) {
		      const row = activeNumberRow(lane);
		      if (!row) return;
	      if (lane.editingField === "qty") {
	        row.qty = normalizeQuantityInput(lane.current) || "1";
	        return;
	      }
	      row.value = lane.current || "0";
	      row.op = operators.includes(lane.pendingOp) ? lane.pendingOp : row.op;
		    }

	    function backspace(lane) {
      if (lane.justEvaluated) {
        clearCurrent(lane);
        return;
      }
	      if (!lane.isTyping || lane.current.length <= 1 || (lane.current.length === 2 && lane.current.startsWith("-"))) {
	        lane.current = "0";
	        lane.isTyping = false;
	        syncEditingRowValue(lane);
	        return;
	      }
	      lane.current = lane.current.slice(0, -1);
	      syncEditingRowValue(lane);
	    }

    function toggleSign(lane) {
      if (lane.current === "0") return;
	      lane.current = lane.current.startsWith("-") ? lane.current.slice(1) : `-${lane.current}`;
	      lane.isTyping = true;
	      lane.justEvaluated = false;
	      ensureEditableNumberRow(lane);
	      syncEditingRowValue(lane);
	    }

    function percent(lane) {
      const value = parseNumber(lane.current);
	      if (!Number.isFinite(value)) return;
	      lane.current = formatPlain(value / 100);
	      lane.isTyping = true;
	      lane.justEvaluated = false;
	      ensureEditableNumberRow(lane);
	      syncEditingRowValue(lane);
	    }

    function addNote(lane) {
      lane.rows.push({
        id: uid(),
        type: "note",
        note: ""
      });
      lane.justEvaluated = false;
    }

    function memoryAdd(lane, direction) {
      if (lane.isTyping) {
        commitCurrent(lane, true);
      }
      const result = calculateSegment(lane, false);
      if (!result.ok) {
        showToast(result.label);
        return;
      }
      lane.rows.push({
        id: uid(),
        type: "memory",
        mode: direction > 0 ? "M+" : "M-",
        value: formatPlain(result.value)
      });
	      lane.current = "0";
	      lane.pendingOp = "+";
	      lane.isTyping = false;
	      lane.justEvaluated = false;
	      lane.editingField = "value";
	      recomputeMemory(lane);
    }

	    function memoryRecall(lane) {
	      lane.current = formatPlain(lane.memory);
	      lane.isTyping = true;
	      lane.justEvaluated = false;
	      syncEditingRowValue(lane);
	    }

	    function memoryClear(lane) {
      lane.rows.push({
        id: uid(),
        type: "memory",
        mode: "MC",
        value: "0"
      });
      lane.current = "0";
	      lane.pendingOp = "+";
	      lane.isTyping = false;
	      lane.justEvaluated = false;
	      lane.editingRowId = "";
	      lane.editingField = "value";
	      recomputeMemory(lane);
    }

	    function calculateSegment(lane, includeCurrent) {
	      const start = activeSegmentStart(lane);
	      const rows = lane.rows.slice(start).filter((row) => row.type === "number");
	      if (includeCurrent && lane.isTyping && !activeNumberRow(lane)) {
	        rows.push({ type: "number", op: lane.pendingOp, value: lane.current });
	      }
	      return calculateRows(rows);
    }

    function calculateFeeBase(lane) {
      const start = activeSegmentStart(lane);
      const rows = lane.rows.slice(start).filter((row) => row.type === "number" && !row.isFee);
      return calculateRows(rows);
    }

	    function calculateRows(rows) {
	      const terms = [];
	      let hasNumber = false;

	      for (const row of rows) {
	        const value = effectiveRowValue(row);
	        if (!Number.isFinite(value)) {
          return { ok: false, value: NaN, label: "入力エラー" };
	        }

	        hasNumber = true;
	        if (row.op === "+") terms.push(value);
	        if (row.op === "-") terms.push(-value);
	        if (row.op === "×") {
	          if (!terms.length) {
	            terms.push(value);
	          } else {
	            terms[terms.length - 1] *= value;
	          }
	        }
	        if (row.op === "÷") {
	          if (value === 0) return { ok: false, value: NaN, label: "0で割れません" };
	          if (!terms.length) {
	            terms.push(value);
	          } else {
	            terms[terms.length - 1] /= value;
	          }
	        }
	      }

	      const total = terms.reduce((sum, value) => sum + value, 0);
	      return { ok: true, value: hasNumber ? total : 0, label: "" };
	    }

	    function effectiveRowValue(row) {
	      const value = parseNumber(row.value);
	      const qty = parseQuantity(row.qty);
	      if (!Number.isFinite(value) || !Number.isFinite(qty)) return NaN;
	      return value * qty;
	    }

	    function signedContribution(row) {
	      const value = effectiveRowValue(row);
	      if (!Number.isFinite(value)) return NaN;
	      if (row.op === "-") return -value;
	      return value;
	    }

	    function signedMemoryValue(row) {
	      const value = parseNumber(row.value);
	      if (!Number.isFinite(value)) return NaN;
	      return row.mode === "M-" ? -value : value;
	    }

	    function isNegativeNumber(value) {
	      const number = typeof value === "number" ? value : parseNumber(value);
	      return Number.isFinite(number) && number < 0;
	    }

	    function isNegativeContribution(row) {
	      return isNegativeNumber(signedContribution(row));
	    }

	    function isNegativeRow(row) {
	      return isNegativeNumber(row.value) || isNegativeContribution(row);
	    }

	    function rowDetailSummary(row) {
	      const lines = [];
	      const qty = parseQuantity(row.qty);
	      if (Number.isFinite(qty) && (qty !== 1 || row.memo)) {
	        lines.push(`${formatQuantity(row.qty)}個`);
	      }
	      if (row.memo) {
	        lines.push(row.memo);
	      }
	      return lines;
	    }

	    function formatLineSubtotal(row) {
	      const qty = parseQuantity(row.qty);
	      const subtotal = effectiveRowValue(row);
	      if (!Number.isFinite(qty) || !Number.isFinite(subtotal)) return "小計 入力エラー";
	      return `小計 ${formatDisplay(subtotal)}`;
	    }

    function activeSegmentStart(lane) {
      for (let index = lane.rows.length - 1; index >= 0; index -= 1) {
        if (lane.rows[index].type === "memory") return index + 1;
      }
      return 0;
    }

    function recomputeAllMemory() {
      state.lanes.forEach(recomputeMemory);
    }

    function recomputeMemory(lane) {
      let memory = 0;
      for (const row of lane.rows) {
        if (row.type !== "memory") continue;
        const value = parseNumber(row.value);
        if (row.mode === "MC") memory = 0;
        if (row.mode === "M+" && Number.isFinite(value)) memory += value;
        if (row.mode === "M-" && Number.isFinite(value)) memory -= value;
      }
      lane.memory = memory;
    }

	    function refreshLaneMeters(lane) {
	      recomputeMemory(lane);
	      const laneEl = lanesEl.querySelector(`[data-lane-id="${cssEscape(lane.id)}"]`);
	      if (!laneEl) return;
	      const segment = calculateSegment(lane, true);
	      const heroTotalEl = laneEl.querySelector('[data-meter="hero-total"]');
	      const memoryEl = laneEl.querySelector('[data-meter="memory"]');
	      heroTotalEl.textContent = formatResult(segment);
	      heroTotalEl.classList.toggle("is-negative", segment.ok && segment.value < 0);
	      memoryEl.textContent = formatDisplay(lane.memory);
	      memoryEl.classList.toggle("is-negative", lane.memory < 0);
	      refreshSummary();
	    }

	    function refreshRowSubtotal(lane, row) {
	      const laneEl = lanesEl.querySelector(`[data-lane-id="${cssEscape(lane.id)}"]`);
		      const rowEl = laneEl?.querySelector(`[data-row-id="${cssEscape(row.id)}"]`);
		      const subtotalEl = rowEl?.querySelector(".row-subtotal");
		      const valueEl = rowEl?.querySelector(".row-value");
	      const qtyEl = rowEl?.querySelector(".row-qty");
		      if (subtotalEl) {
		        subtotalEl.textContent = formatLineSubtotal(row);
		        subtotalEl.classList.toggle("is-negative", isNegativeContribution(row) || isNegativeNumber(effectiveRowValue(row)));
		      }
		      if (valueEl) {

	        qtyEl.textContent = formatQuantity(row.qty || "1");

    function refreshActiveEdit(lane) {
      const row = activeNumberRow(lane);
      if (!row) {
        refreshLaneMeters(lane);
        refreshSummary();
        saveState();
        return;
      }
      const laneEl = lanesEl.querySelector(`[data-lane-id="${cssEscape(lane.id)}"]`);
