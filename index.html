      refreshSummary();
      saveState();
    }

		    function refreshSummary() {
		      const lane = activeLane();
		      if (!lane) return;
		      const segment = calculateSegment(lane, true);
		      const currentIsNegative = isNegativeNumber(lane.current);
	      const isQtyEditing = lane.editingField === "qty" && Boolean(activeNumberRow(lane));
		      activeTitleEl.textContent = lane.title;
		      sideDisplayEl.textContent = displayCurrent(lane);
	      activeInputEl.textContent = isQtyEditing ? `個数 ${displayCurrent(lane)}` : `入力 ${lane.pendingOp} ${displayCurrent(lane)}`;
	      activeTotalEl.textContent = `合計 ${formatResult(segment)}`;
	      activeMemoryEl.textContent = `M ${formatDisplay(lane.memory)}`;
	      sideDisplayEl.classList.toggle("is-negative", currentIsNegative);
	      activeInputEl.classList.toggle("is-negative", currentIsNegative);
	      activeTotalEl.classList.toggle("is-negative", segment.ok && segment.value < 0);
	      activeMemoryEl.classList.toggle("is-negative", lane.memory < 0);
	      laneCountEl.textContent = `${state.lanes.length}連`;
	      lockToggleEl.classList.toggle("is-active", Boolean(lane.locked));
	      lockToggleEl.textContent = lane.locked ? "ロック中" : "ロック";
	      lockToggleEl.title = lane.locked ? "選択中の電卓のロックを解除" : "選択中の電卓をロック";
	    }

    function displayCurrent(lane) {
      if (lane.isTyping) return lane.current;
      return formatDisplay(lane.current);
    }

    function formatResult(result) {
      if (!result.ok) return result.label;
      return formatDisplay(result.value);
    }

    function formatDisplay(value) {
      const number = parseNumber(value);
      if (!Number.isFinite(number)) return "入力エラー";
      const rounded = roundFloating(number);
      return rounded.toLocaleString("ja-JP", {
        maximumFractionDigits: 10
      });
    }

    function formatPlain(value) {
      const number = parseNumber(value);
      if (!Number.isFinite(number)) return "0";
      return String(roundFloating(number));
    }

    function roundFloating(number) {
      if (!Number.isFinite(number)) return number;
      const rounded = Math.round((number + Number.EPSILON) * 1e10) / 1e10;
      return Object.is(rounded, -0) ? 0 : rounded;
    }

    function normalizeInput(value) {
      const raw = String(value).replace(/,/g, "").trim();
      const number = Number(raw);
      return Number.isFinite(number) ? formatPlain(number) : raw;
    }

    function parseNumber(value) {
      const raw = String(value).replace(/,/g, "").trim();
      if (!raw || raw === "-" || raw === "." || raw === "-.") return NaN;
      return Number(raw);
    }

    function parseQuantity(value) {
      const raw = String(value ?? "1").replace(/,/g, "").trim();
      if (!raw) return 1;
      const qty = Number(raw);
      return Number.isFinite(qty) ? qty : NaN;
    }

    function normalizeQuantityInput(value) {
      const raw = String(value).replace(/[^\d.]/g, "");
      const parts = raw.split(".");
      if (parts.length <= 1) return raw;
      return `${parts[0]}.${parts.slice(1).join("")}`;
    }

    function normalizeJanInput(value) {
      return String(value || "").replace(/\D/g, "").slice(0, 14);
    }

    function isValidJan(value) {
      const jan = normalizeJanInput(value);
      return /^\d{8}$/.test(jan) || /^\d{12,14}$/.test(jan);
    }

    function formatQuantity(value) {
      const qty = parseQuantity(value);
      if (!Number.isFinite(qty)) return "入力エラー";
      return roundFloating(qty).toLocaleString("ja-JP", {
        maximumFractionDigits: 3
      });
    }

    function trimInputLength(value) {
      const sign = value.startsWith("-") ? "-" : "";
      const body = sign ? value.slice(1) : value;
      if (body.length <= 16) return value;
      return sign + body.slice(0, 16);
    }

    function getLane(id) {
      return state.lanes.find((lane) => lane.id === id);
    }

    function getRow(lane, id) {
      return lane.rows.find((row) => row.id === id);
    }

    function activeLane() {
      return getLane(state.activeId);
    }

    function ensureActiveLane() {
      if (!state.lanes.length) {
        state = createDefaultState();
      }
      if (!getLane(state.activeId)) {
        state.activeId = state.lanes[0].id;
      }
    }

		    function setActiveLane(id) {
		      if (!id || state.activeId === id) return;
		      state.activeId = id;
		      document.querySelectorAll(".lane").forEach((laneEl) => {
		        laneEl.classList.toggle("is-active", laneEl.dataset.laneId === id);
	      });
	      refreshSummary();
		      saveState();
		    }

    function isLaneLocked(lane) {
      return Boolean(lane?.locked);
    }

    function guardLaneUnlocked(lane) {
      if (!isLaneLocked(lane)) return true;
      showToast("ロック中です");
      return false;
    }

    function toggleActiveLaneLock() {
      const lane = activeLane();
      if (!lane) return;
      lane.locked = !lane.locked;
      if (lane.locked) {
        lane.editingRowId = "";
        lane.editingField = "value";
        lane.isTyping = false;
      }
      render();
      showToast(lane.locked ? "ロックしました" : "ロック解除しました");
    }

	    function isRowControlTarget(target) {
	      return Boolean(target.closest("button, select, textarea, .lane-title, .row-qty, .row-memo, .row-jan, .note-value, .qty-box, .memo-box, .jan-box"));
	    }

	    function focusDetailBox(box) {
	      const rowEl = box.closest(".tape-row.number");
	      const laneId = box.closest(".lane")?.dataset.laneId;
	      const rowId = rowEl?.dataset.rowId || box.dataset.rowId;
	      if (box.classList.contains("qty-box")) {
	        selectQuantityBox(laneId, rowId);
	        return;
	      }

	      if (box.classList.contains("jan-box")) {
	        const input = box.querySelector(".row-jan");
	        selectNumberRow(laneId, rowId);
	        requestAnimationFrame(() => input?.focus());
	        return;
	      }

	      const input = box.querySelector(".row-memo");
	      if (!input) return;
	      selectNumberRow(laneId, rowId);
	      requestAnimationFrame(() => {
	        input.focus();
	        input.select?.();
	      });
	    }

	    function selectNumberRow(laneId, rowId) {
	      const lane = getLane(laneId);
	      const row = lane ? getRow(lane, rowId) : null;
	      if (!lane || !row || row.type !== "number") return;
	      if (!guardLaneUnlocked(lane)) return;
	      state.activeId = lane.id;
	      lane.editingRowId = row.id;
	      lane.editingField = "value";
	      lane.current = row.value || "0";
	      lane.pendingOp = row.op;
	      lane.isTyping = true;
	      lane.justEvaluated = false;
	      document.querySelectorAll(".lane").forEach((laneEl) => {
	        laneEl.classList.toggle("is-active", laneEl.dataset.laneId === lane.id);
	      });
	      const laneEl = lanesEl.querySelector(`[data-lane-id="${cssEscape(lane.id)}"]`);
	      laneEl?.querySelectorAll(".tape-row.number").forEach((rowEl) => {
	        rowEl.classList.toggle("is-editing", rowEl.dataset.rowId === row.id);
	      });
	      refreshSummary();
	      saveState();
	    }

	    function selectQuantityBox(laneId, rowId) {
	      const lane = getLane(laneId);
	      const row = lane ? getRow(lane, rowId) : null;
	      if (!lane || !row || row.type !== "number") return;
	      if (!guardLaneUnlocked(lane)) return;
	      state.activeId = lane.id;
	      lane.editingRowId = row.id;
	      lane.editingField = "qty";
	      lane.current = row.qty || "1";
	      lane.pendingOp = row.op;
	      lane.isTyping = false;
	      lane.justEvaluated = false;
	      document.querySelectorAll(".lane").forEach((laneEl) => {
	        laneEl.classList.toggle("is-active", laneEl.dataset.laneId === lane.id);
	      });
	      const laneEl = lanesEl.querySelector(`[data-lane-id="${cssEscape(lane.id)}"]`);
	      laneEl?.querySelectorAll(".tape-row.number").forEach((item) => {
	        item.classList.toggle("is-editing", item.dataset.rowId === row.id);
	      });
	      refreshSummary();
	      saveState();
	    }

			    function openRowDetail(laneId, rowId) {
	      clearLongPress();
	      const lane = getLane(laneId);
	      const row = lane ? getRow(lane, rowId) : null;
	      if (!row || row.type !== "number") return;
	      if (!guardLaneUnlocked(lane)) return;
	      selectNumberRow(laneId, rowId);
	      if (row.detailOpen) {
	        return;
	      }
	      row.detailOpen = true;
	      const rowEl = lanesEl.querySelector(`[data-row-id="${cssEscape(row.id)}"]`);
	      rowEl?.classList.add("has-open-detail");
	      rowEl?.querySelector(".row-detail")?.classList.add("is-open");
	      saveState();
	    }

	    function closeRowDetail(lane, row) {
	      if (!row || row.type !== "number") return;
	      row.detailOpen = false;
	      const rowEl = lanesEl.querySelector(`[data-row-id="${cssEscape(row.id)}"]`);
	      rowEl?.querySelector(".row-detail")?.classList.remove("is-open");
	      setTimeout(() => {
	        rowEl?.classList.remove("has-open-detail");
	        render();
	      }, 190);
	    }

		    function clearLongPress() {
		      if (!longPressTimer) return;
		      window.clearTimeout(longPressTimer);
		      longPressTimer = null;
		    }

	    function startLaneReorderPress(event, laneEl) {
	      if (!laneEl) return;
	      event.preventDefault();
	      clearLaneDragTimer();
	      const pointerId = event.pointerId;
	      const startX = event.clientX;
	      const startY = event.clientY;
	      laneDragTimer = window.setTimeout(() => {
	        beginLaneReorder(laneEl.dataset.laneId, pointerId, startX, startY);
	      }, 520);
	    }

	    function beginLaneReorder(laneId, pointerId, clientX, clientY) {
	      laneDragTimer = null;
	      const laneEl = lanesEl.querySelector(`[data-lane-id="${cssEscape(laneId)}"]`);
	      if (!laneEl) return;
	      const rect = laneEl.getBoundingClientRect();
	      const ghost = laneEl.cloneNode(true);
	      ghost.classList.remove("is-touch-dragging", "is-dragging", "is-drop-target");
	      ghost.classList.add("lane-drag-ghost");
	      ghost.removeAttribute("draggable");
	      ghost.setAttribute("aria-hidden", "true");
	      ghost.style.width = `${rect.width}px`;
	      ghost.style.height = `${rect.height}px`;
	      ghost.style.transition = "none";
	      ghost.style.transform = `translate3d(${rect.left}px, ${rect.top}px, 0) scale(1) rotate(0deg)`;
	      document.body.appendChild(ghost);
	      laneDragState = {
	        id: laneId,
	        pointerId,
	        ghost,
	        originRect: rect,
	        offsetX: clientX - rect.left,
	        offsetY: clientY - rect.top,
	        lastX: clientX,
	        lastY: clientY
	      };
	      lanesEl.classList.add("is-reordering");
	      laneEl.classList.add("is-touch-dragging");
	      ghost.getBoundingClientRect();
	      ghost.style.transition = "";
	      moveLaneGhost(clientX, clientY, 0);
	      try {
	        lanesEl.setPointerCapture(pointerId);
	      } catch (error) {
	        // Pointer capture is best-effort; regular pointermove still works without it.
	      }
	    }

	    function handleLaneReorderMove(event) {
	      if (!laneDragState || event.pointerId !== laneDragState.pointerId) return;
	      event.preventDefault();
	      const targetLaneEl = laneReorderTargetAt(event.clientX, event.clientY);
	      moveLaneGhost(event.clientX, event.clientY, null, targetLaneEl);
	      if (!targetLaneEl || targetLaneEl.dataset.laneId === laneDragState.id) return;
	      reorderLane(laneDragState.id, targetLaneEl.dataset.laneId, { scroll: false });
	    }

	    function endLaneReorder(event) {
	      const dragState = laneDragState;
	      if (!dragState) return;
	      if (event?.pointerId === dragState.pointerId) {
	        try {
	          lanesEl.releasePointerCapture(event.pointerId);
	        } catch (error) {
	          // Pointer capture may already be released.
	        }
	      }
	      laneDragState = null;
	      const ghost = dragState.ghost;
	      const finalLaneEl = lanesEl.querySelector(`[data-lane-id="${cssEscape(dragState.id)}"]`);
	      const cleanup = () => {
	        ghost?.remove();
	        lanesEl.classList.remove("is-reordering");
	        lanesEl.querySelectorAll(".lane.is-touch-dragging").forEach((laneEl) => {
	          laneEl.classList.remove("is-touch-dragging");
	        });
	      };
	      if (!ghost || !finalLaneEl) {
	        cleanup();
	        return;
	      }
	      const finalRect = finalLaneEl.getBoundingClientRect();
	      ghost.classList.add("is-returning");
	      ghost.style.width = `${finalRect.width}px`;
	      ghost.style.height = `${finalRect.height}px`;
	      ghost.style.transform = `translate3d(${finalRect.left}px, ${finalRect.top}px, 0) scale(1) rotate(0deg)`;
	      window.setTimeout(cleanup, 210);
	    }

	    function clearLaneDragTimer() {
	      if (!laneDragTimer) return;
	      window.clearTimeout(laneDragTimer);
	      laneDragTimer = null;
	    }

	    function moveLaneGhost(clientX, clientY, tilt = null, targetLaneEl = null) {
	      if (!laneDragState?.ghost) return;
	      const x = clientX - laneDragState.offsetX;
	      const lockToRow = shouldLockLaneDragToRow(clientY, targetLaneEl);
	      const y = lockToRow ? laneDragState.originRect.top : clientY - laneDragState.offsetY;
	      const nextTilt = tilt ?? Math.max(-1.1, Math.min(1.1, (clientX - laneDragState.lastX) * 0.045));
	      laneDragState.lastX = clientX;
	      laneDragState.lastY = clientY;
	      laneDragState.ghost.style.transform = `translate3d(${x}px, ${y}px, 0) scale(1.035) rotate(${nextTilt}deg)`;
	    }

	    function laneReorderTargetAt(clientX, clientY) {
	      if (!laneDragState) return null;
	      const targetLaneEl = document.elementFromPoint(clientX, clientY)?.closest(".lane");
	      if (!targetLaneEl || !lanesEl.contains(targetLaneEl)) return null;
	      return targetLaneEl.dataset.laneId === laneDragState.id ? null : targetLaneEl;
	    }

	    function shouldLockLaneDragToRow(clientY, targetLaneEl) {
	      if (!laneDragState?.originRect) return false;
	      if (targetLaneEl) {
	        return isSameLaneRow(laneDragState.originRect, targetLaneEl.getBoundingClientRect());
	      }
	      const rect = laneDragState.originRect;
	      return clientY >= rect.top - 36 && clientY <= rect.bottom + 36;
	    }

	    function markDropTarget(targetLaneEl) {
	      lanesEl.querySelectorAll(".lane.is-drop-target").forEach((laneEl) => {
	        laneEl.classList.remove("is-drop-target");
	      });
	      targetLaneEl.classList.add("is-drop-target");
	    }

	    function clearDragState() {
	      draggedLaneId = null;
	      lanesEl.querySelectorAll(".lane.is-dragging, .lane.is-drop-target").forEach((laneEl) => {
	        laneEl.classList.remove("is-dragging", "is-drop-target");
	      });
	    }

	    function snapshotLaneRects() {
	      const rects = new Map();
	      lanesEl.querySelectorAll(".lane").forEach((laneEl) => {
	        rects.set(laneEl.dataset.laneId, laneEl.getBoundingClientRect());
	      });
	      return rects;
	    }

	    function animateLaneLayout(previousRects, options = {}) {
	      requestAnimationFrame(() => {
	        lanesEl.querySelectorAll(".lane").forEach((laneEl) => {
	          const previous = previousRects.get(laneEl.dataset.laneId);
	          if (!previous) return;
	          const next = laneEl.getBoundingClientRect();
	          const dx = previous.left - next.left;
	          let dy = previous.top - next.top;
	          if (options.horizontalOnly && isSameLaneRow(previous, next)) {
	            dy = 0;
	          }
	          if (!dx && !dy) return;
	          laneEl.style.transition = "none";
	          laneEl.style.transform = `translate(${dx}px, ${dy}px)`;
	          laneEl.getBoundingClientRect();
	          requestAnimationFrame(() => {
	            laneEl.style.transition = "transform 220ms cubic-bezier(0.22, 1, 0.36, 1)";
	            laneEl.style.transform = "";
	            window.setTimeout(() => {
	              laneEl.style.transition = "";
	              laneEl.style.transform = "";
	            }, 240);
	          });
	        });
	      });
	    }

	    function isSameLaneRow(firstRect, secondRect) {
	      if (!firstRect || !secondRect) return false;
	      const tolerance = Math.max(32, Math.min(firstRect.height, secondRect.height) * 0.08);
	      return Math.abs(firstRect.top - secondRect.top) <= tolerance;
	    }

		    function reorderLane(sourceId, targetId, options = {}) {
		      if (!sourceId || !targetId || sourceId === targetId) return;
	      const before = snapshotLaneRects();
	      const sourceRect = before.get(sourceId);
	      const targetRect = before.get(targetId);
	      const horizontalOnly = isSameLaneRow(sourceRect, targetRect);
		      const sourceIndex = state.lanes.findIndex((lane) => lane.id === sourceId);
		      const targetIndex = state.lanes.findIndex((lane) => lane.id === targetId);
		      if (sourceIndex < 0 || targetIndex < 0) return;
		      const [lane] = state.lanes.splice(sourceIndex, 1);
		      state.lanes.splice(targetIndex, 0, lane);
		      state.activeId = sourceId;
		      render();
	      animateLaneLayout(before, { horizontalOnly });
	      if (laneDragState?.id === sourceId) {
	        lanesEl.classList.add("is-reordering");
	        lanesEl.querySelector(`[data-lane-id="${cssEscape(sourceId)}"]`)?.classList.add("is-touch-dragging");
	      }
	      if (options.scroll !== false) {
	        scrollLaneIntoView(sourceId);
	      }
		    }

	    function removeLane(id) {
	      if (state.lanes.length <= 1) {
	        showToast("最後の1つは残します");
        return;
      }
      const index = state.lanes.findIndex((lane) => lane.id === id);
      if (index < 0) return;
      state.lanes.splice(index, 1);
      if (state.activeId === id) {
        state.activeId = state.lanes[Math.max(0, index - 1)].id;
      }
      render();
    }

    function scrollLaneIntoView(id) {
      requestAnimationFrame(() => {
        const laneEl = lanesEl.querySelector(`[data-lane-id="${cssEscape(id)}"]`);
        laneEl?.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
      });
    }

    function buildExportText() {
      const lines = [];
      lines.push("N連リスト電卓");
      lines.push(new Date().toLocaleString("ja-JP"));
      lines.push("");

      for (const lane of state.lanes) {
        const segment = calculateSegment(lane, true);
        lines.push(`[${lane.title}]`);
        lines.push(`Total\t${formatResult(segment)}`);
        lines.push(`Memory\t${formatDisplay(lane.memory)}`);
        lines.push("Type\tOp\tUnit\tQty\tSubtotal\tMemo\tJAN");
        for (const row of lane.rows) {
          if (row.type === "number") {
            lines.push(`Number\t${row.op}\t${normalizeInput(row.value)}\t${formatQuantity(row.qty)}\t${formatDisplay(effectiveRowValue(row))}\t${row.memo || ""}\t${row.jan || ""}`);
          }
          if (row.type === "note") lines.push(`Memo\t\t\t\t\t${row.note || ""}\t`);
          if (row.type === "memory") lines.push(`${row.mode}\t\t${row.value}\t\t\t\t`);
        }
	        if (lane.isTyping && !activeNumberRow(lane)) {
	          lines.push(`Current\t${lane.pendingOp}\t${lane.current}`);
	        }
        lines.push("");
      }

      return lines.join("\n");
    }

    async function copyExportText() {
      await copyText(exportTextEl.value, "コピーしました", exportTextEl);
    }

    async function copyText(text, message, fallbackEl = exportTextEl) {
      try {
        await navigator.clipboard.writeText(text);
        showToast(message);
      } catch (error) {
        const activeTextEl = document.activeElement?.matches("textarea") ? document.activeElement : fallbackEl;
        activeTextEl.focus();
        activeTextEl.select();
        document.execCommand("copy");
        showToast(message);
      }
    }

    function downloadExportText() {
      downloadText(exportTextEl.value, `nren-calc-${new Date().toISOString().slice(0, 10)}.txt`, "text/plain;charset=utf-8");
      showToast("TXTを作成しました");
    }

    function downloadText(text, filename, type) {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      document.body.append(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    function mapKeyboardKey(event) {
      if (/^\d$/.test(event.key)) return event.key;
      if (event.key === ".") return ".";
      if (event.key === "+") return "+";
      if (event.key === "-") return "-";
      if (event.key === "*") return "×";
      if (event.key === "/") return "÷";
      if (event.key === "Enter") return "commit";
      if (event.key === "=") return null;
      if (event.key === "Backspace") return "back";
      if (event.key === "Escape") return "AC";
      if (event.key === "%") return "%";
      return null;
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.classList.remove("show");
      }, 1600);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function cssEscape(value) {
      if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(value);
      return String(value).replace(/"/g, '\\"');
    }

    function showUpdateBanner(worker) {
      pendingServiceWorker = worker;
      updateBannerEl.classList.add("show");
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").then((registration) => {
          if (registration.waiting) {
            showUpdateBanner(registration.waiting);
          }
          registration.addEventListener("updatefound", () => {
            const worker = registration.installing;
            if (!worker) return;
            worker.addEventListener("statechange", () => {
              if (worker.state === "installed" && navigator.serviceWorker.controller) {
                showUpdateBanner(worker);
              }
            });
          });
        }).catch((error) => {
          console.warn("Service worker registration failed", error);
        });
      });

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        window.location.reload();
      });
    }
  </script>
</body>
</html>
